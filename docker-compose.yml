#   Limbo 1.9.323.700
# Description: Deploy compose file with managed assets sync

x-assets-depends: &assets_depends
  assets:
    condition: service_completed_successfully

volumes:
  mqdata:
    driver: local
  pgdata:
    driver: local
  solrdata:
    driver: local
  dbdump:
    driver: local
  solrdump:
    driver: local
  limbo_bridge_init_state:
    name: limbo_bridge_init_state
    driver: local
  slskd_data:
    driver: local

services:
  assets:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-assets:${LIMBO_CHANNEL:-latest}
    pull_policy: always
    environment:
      - LIMBO_ASSETS_FORCE_SYNC=${LIMBO_ASSETS_FORCE_SYNC:-1}
      - LIMBO_ASSETS_DEPLOY_VERSION=1.9.323.700
    volumes:
      - ./:/out
    restart: "no"

  preflight:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/core-env.sh"]
    env_file:
      - ./.env
    volumes:
      - ./.env:/run/limbo.env:ro
    restart: "no"
    depends_on:
      <<: *assets_depends
      host-ip-preflight:
        condition: service_completed_successfully

  host-ip-preflight:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/host-ip.sh"]
    network_mode: host
    env_file:
      - ./.env
    volumes:
      - ./.env:/run/limbo.env:ro
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        bind:
          create_host_path: true
    restart: "no"
    depends_on:
      <<: *assets_depends

  slskd-preflight:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/slskd-mounts.sh"]
    scale: ${LIMBO_SLSKD_SCALE:-1}
    env_file:
      - ./.env
    restart: "no"
    depends_on:
      <<: *assets_depends
      host-ip-preflight:
        condition: service_completed_successfully

  limbo-key-init:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    pull_policy: always
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        python3 - <<'PY'
        import os
        import secrets
        from pathlib import Path
        from metadata_srv.services import secret_store

        state_dir = Path(os.getenv("LIMBO_INIT_STATE_DIR", "/metadata/init-state"))
        state_dir.mkdir(parents=True, exist_ok=True)

        key = str(secret_store.get_secret("limbo.apikey") or "").strip()
        created = False
        if not key:
            key = secrets.token_hex(16)
            secret_store.set_secret("limbo.apikey", key)
            created = True

        key_file = state_dir / "limbo_apikey.txt"
        try:
            current = key_file.read_text(encoding="utf-8").strip()
        except Exception:
            current = ""
        if key and current != key:
            key_file.write_text(key + "\n", encoding="utf-8")

        print("limbo-key-init:", "created" if created else "exists")
        PY
    volumes:
      - limbo_bridge_init_state:/metadata/init-state
    restart: "no"
    depends_on:
      <<: *assets_depends

  db:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-db:${LIMBO_CHANNEL:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped
    command: postgres -c "shared_buffers=${POSTGRES_SHARED_BUFFERS:-4GB}" -c "shared_preload_libraries=pg_amqp.so"
    environment:
      - TZ=${TZ:-UTC}
      - POSTGRES_USER=${MB_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}
    shm_size: "${POSTGRES_SHM_SIZE:-4GB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    depends_on:
      <<: *assets_depends

  mq:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-mq:${LIMBO_CHANNEL:-latest}
    hostname: "mq"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    ulimits:
      nofile: 65536
    volumes:
      - mqdata:/var/lib/rabbitmq
    expose:
      - "5672"
    depends_on:
      <<: *assets_depends

  redis:
    image: redis:3-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    expose:
      - "6379"
    depends_on:
      <<: *assets_depends

  slskd:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-slskd:${LIMBO_CHANNEL:-latest}
    pull_policy: always
    scale: ${LIMBO_SLSKD_SCALE:-1}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    ports:
      - "${SLSKD_WEB_SERVER_PORT:-5030}:5030"
      - "${SLSKD_HTTPS_SERVER_PORT:-5031}:5031"
      - "${SLSKD_SLSK_PORT:-50300}:50300"
    environment:
      - TZ=${TZ:-UTC}
      - SLSKD_REMOTE_CONFIGURATION=${SLSKD_REMOTE_CONFIGURATION:-true}
      - SLSKD_REMOTE_FILE_MANAGEMENT=${SLSKD_REMOTE_FILE_MANAGEMENT:-true}
      - SLSKD_USERNAME=${LIMBO_USERNAME:-limbo}
      - SLSKD_PASSWORD=${LIMBO_PASSWORD:-limbo}
      - LIMBO_APIKEY=${LIMBO_APIKEY:-}
      - SLSKD_API_KEY=${LIMBO_APIKEY:-}
    volumes:
      - slskd_data:/app
      - limbo_bridge_init_state:/metadata/init-state
      - type: bind
        source: ${LIMBO_SLSKD_PARENT_MOUNT}
        target: /music
        bind:
          create_host_path: true
      - type: bind
        source: ${LIMBO_SLSKD_SHARING_MOUNT:-${LIMBO_SLSKD_PARENT_MOUNT}/shared_files}
        target: /shared_files
        bind:
          create_host_path: true
      - type: bind
        source: ${LIMBO_SLSKD_DOWNLOADS_MOUNT:-${LIMBO_SLSKD_PARENT_MOUNT}/slskd_downloads}
        target: /downloads
        bind:
          create_host_path: true
      - type: bind
        source: ${LIMBO_SLSKD_INCOMPLETE_DOWNLOADS_MOUNT:-${LIMBO_SLSKD_DOWNLOADS_MOUNT:-${LIMBO_SLSKD_PARENT_MOUNT}/slskd_downloads}/slskd_incomplete}
        target: /incomplete
        bind:
          create_host_path: true
    restart: unless-stopped
    depends_on:
      <<: *assets_depends
      slskd-preflight:
        condition: service_completed_successfully

  bootstrap:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-bootstrap:${LIMBO_CHANNEL:-latest}
    environment:
      - TZ=${TZ:-UTC}
      - POSTGRES_USER=${MB_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}
      - MUSICBRAINZ_BOOTSTRAP_DB=${MUSICBRAINZ_BOOTSTRAP_DB:-1}
      - MUSICBRAINZ_BOOTSTRAP_FETCH_DUMPS=${MUSICBRAINZ_BOOTSTRAP_FETCH_DUMPS:-1}
      - MUSICBRAINZ_BOOTSTRAP_MATERIALIZED=${MUSICBRAINZ_BOOTSTRAP_MATERIALIZED:-1}
      - MUSICBRAINZ_BOOTSTRAP_WGET_OPTIONS=${MUSICBRAINZ_BOOTSTRAP_WGET_OPTIONS:-}
      - MUSICBRAINZ_BOOTSTRAP_DB_MARKER=${MUSICBRAINZ_BOOTSTRAP_DB_MARKER:-/media/dbdump/.bootstrap.db.done}
      - MUSICBRAINZ_BOOTSTRAP_MATERIALIZED_MARKER=${MUSICBRAINZ_BOOTSTRAP_MATERIALIZED_MARKER:-/media/dbdump/.bootstrap.materialized.done}
      - MUSICBRAINZ_BOOTSTRAP_MARKER=${MUSICBRAINZ_BOOTSTRAP_MARKER:-/media/dbdump/.bootstrap.done}
    volumes:
      - dbdump:/media/dbdump
    command: ["bootstrap.sh"]
    restart: "no"
    depends_on:
      <<: *assets_depends
      preflight:
        condition: service_completed_successfully
      db:
        condition: service_started

  search-bootstrap:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-search:${LIMBO_CHANNEL:-latest}
    entrypoint: ["/usr/local/bin/bootstrap-indexes.sh"]
    environment:
      - TZ=${TZ:-UTC}
      - MUSICBRAINZ_BOOTSTRAP_SEARCH_INDEXES=${MUSICBRAINZ_BOOTSTRAP_SEARCH_INDEXES:-download}
      - MUSICBRAINZ_BOOTSTRAP_WAIT_FOR_DB=${MUSICBRAINZ_BOOTSTRAP_WAIT_FOR_DB:-1}
      - MUSICBRAINZ_BOOTSTRAP_DB_MARKER=${MUSICBRAINZ_BOOTSTRAP_DB_MARKER:-/media/dbdump/.bootstrap.db.done}
      - MUSICBRAINZ_BOOTSTRAP_SEARCH_MARKER=${MUSICBRAINZ_BOOTSTRAP_SEARCH_MARKER:-/var/cache/musicbrainz/solr-backups/.bootstrap.solr.done}
      - MUSICBRAINZ_BOOTSTRAP_SOLR_CLEANUP=${MUSICBRAINZ_BOOTSTRAP_SOLR_CLEANUP:-0}
      - SOLR_HEAP=${SOLR_HEAP:-4g}
    volumes:
      - solrdata:/var/solr
      - solrdump:/var/cache/musicbrainz/solr-backups
      - dbdump:/media/dbdump:ro
    ulimits:
      nofile: 65536
    restart: "no"
    depends_on:
      <<: *assets_depends
      preflight:
        condition: service_completed_successfully
      bootstrap:
        condition: service_completed_successfully

  search:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-search:${LIMBO_CHANNEL:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    ulimits:
      nofile: 65536
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - SOLR_HEAP=${SOLR_HEAP:-4g}
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    expose:
      - "8983"
    volumes:
      - dbdump:/media/dbdump:ro
      - solrdata:/var/solr
      - solrdump:/var/cache/musicbrainz/solr-backups
    depends_on:
      <<: *assets_depends
      search-bootstrap:
        condition: service_completed_successfully

  musicbrainz:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-musicbrainz:${LIMBO_CHANNEL:-latest}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "50"
    ports:
      - "${MUSICBRAINZ_DOCKER_HOST_IPADDRCOL:-}${MUSICBRAINZ_WEB_SERVER_PORT:-5000}:5000"
    volumes:
      - dbdump:/media/dbdump
      - solrdump:/var/cache/musicbrainz/solr-backups:ro
      - limbo_bridge_init_state:/metadata/init-state:ro
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - POSTGRES_USER=${MB_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}
      - MUSICBRAINZ_BASE_FTP_URL=${MUSICBRAINZ_BASE_FTP_URL:-}
      - MUSICBRAINZ_BASE_DOWNLOAD_URL=${MUSICBRAINZ_BASE_DOWNLOAD_URL:-https://data.metabrainz.org/pub/musicbrainz}
      - MUSICBRAINZ_CAA_BASE_URL=${MUSICBRAINZ_CAA_BASE_URL:-}
      - MUSICBRAINZ_SERVER_PROCESSES=${MUSICBRAINZ_SERVER_PROCESSES:-10}
      - MUSICBRAINZ_RUNTIME_MODE=${MUSICBRAINZ_RUNTIME_MODE:-headless}
      - STATIC_RESOURCES_LOCATION=${STATIC_RESOURCES_LOCATION:-/static/build}
      - MUSICBRAINZ_REPLICATION_ENABLED=${MUSICBRAINZ_REPLICATION_ENABLED:-1}
      - MUSICBRAINZ_REPLICATION_TIME=${MUSICBRAINZ_REPLICATION_TIME:-03:00}
      - MUSICBRAINZ_REPLICATION_SCHEDULE=${MUSICBRAINZ_REPLICATION_SCHEDULE:-}
      - MUSICBRAINZ_REPLICATION_TOKEN=${MUSICBRAINZ_REPLICATION_TOKEN:-}
      - LIMBO_ADMIN_ENABLED=${LIMBO_ADMIN_ENABLED:-true}
      - LIMBO_ADMIN_HOST=${LIMBO_ADMIN_HOST:-0.0.0.0}
      - LIMBO_ADMIN_PORT=${LIMBO_ADMIN_PORT:-8099}
      - LIMBO_ADMIN_HEADER=${LIMBO_ADMIN_HEADER:-X-Limbo-Key}
      - LIMBO_ADMIN_NOTIFY_URL=${LIMBO_ADMIN_NOTIFY_URL:-http://limbo:5001/replication/notify}
      - LIMBO_ADMIN_NOTIFY_HEADER=${LIMBO_ADMIN_NOTIFY_HEADER:-X-Limbo-Key}
      - LIMBO_ADMIN_NOTIFY_TIMEOUT=${LIMBO_ADMIN_NOTIFY_TIMEOUT:-5}
      - LIMBO_ADMIN_LOCK=${LIMBO_ADMIN_LOCK:-/tmp/replication.pid}
      - LIMBO_ADMIN_REPL_SCRIPT=${LIMBO_ADMIN_REPL_SCRIPT:-/usr/local/bin/replication.sh}
      - MUSICBRAINZ_USE_PROXY=1
      - MUSICBRAINZ_WEB_SERVER_HOST=${MUSICBRAINZ_WEB_SERVER_HOST:-localhost}
      - MUSICBRAINZ_WEB_SERVER_PORT=${MUSICBRAINZ_WEB_SERVER_PORT:-5000}
    depends_on:
      <<: *assets_depends
      preflight:
        condition: service_completed_successfully
      limbo-key-init:
        condition: service_completed_successfully
      db:
        condition: service_started
      mq:
        condition: service_started
      search:
        condition: service_started
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
      search-bootstrap:
        condition: service_completed_successfully

  indexer:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-indexer:${LIMBO_CHANNEL:-latest}
    environment:
      - TZ=${TZ:-UTC}
      - POSTGRES_USER=${MB_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - dbdump:/media/dbdump
    depends_on:
      <<: *assets_depends
      db:
        condition: service_started
      mq:
        condition: service_started
      search:
        condition: service_started

  indexer-cron:
    image: ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-indexer:${LIMBO_CHANNEL:-latest}
    environment:
      - TZ=${TZ:-UTC}
      - POSTGRES_USER=${MB_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}
      - MUSICBRAINZ_INDEXING_ENABLED=${MUSICBRAINZ_INDEXING_ENABLED:-1}
      - MUSICBRAINZ_INDEXING_TIME=${MUSICBRAINZ_INDEXING_TIME:-01:00}
      - MUSICBRAINZ_INDEXING_DAY=${MUSICBRAINZ_INDEXING_DAY:-Sunday}
      - MUSICBRAINZ_INDEXING_FREQUENCY=${MUSICBRAINZ_INDEXING_FREQUENCY:-weekly}
      - MUSICBRAINZ_BOOTSTRAP_DB_MARKER=${MUSICBRAINZ_BOOTSTRAP_DB_MARKER:-/media/dbdump/.bootstrap.db.done}
    volumes:
      - dbdump:/media/dbdump
    command: ["/usr/local/bin/indexer-cron.sh"]
    restart: unless-stopped
    depends_on:
      <<: *assets_depends
      db:
        condition: service_started
      search:
        condition: service_started

  limbo-init:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    pull_policy: always
    entrypoint: ["/bin/bash", "/metadata/init/init-mbdb.sh"]
    environment:
      TZ: ${TZ:-UTC}
      MB_DB_HOST: ${MB_DB_HOST:-db}
      MB_DB_PORT: ${MB_DB_PORT:-5432}
      MB_DB_USER: ${MB_DB_USER:-musicbrainz}
      MB_DB_PASSWORD: ${MB_DB_PASSWORD:-musicbrainz}
      MB_DB_NAME: ${MB_DB_NAME:-musicbrainz_db}
      LIMBO_CACHE_DB: ${LIMBO_CACHE_DB:-lm_cache_db}
      LIMBO_CACHE_USER: ${LIMBO_CACHE_USER:-limbo}
      LIMBO_CACHE_PASSWORD: ${LIMBO_CACHE_PASSWORD:-limbo}
    restart: "no"
    depends_on:
      <<: *assets_depends
      db:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully

  limbo:
    image: ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
    pull_policy: always
    ports:
      - "${LIMBO_PORT:-5001}:5001"
    volumes:
      - limbo_bridge_init_state:/metadata/init-state
      - dbdump:/media/dbdump:ro
      - ./admin/.limbo/assets/LIMBO_TAG_VERSION:/limbo/VERSION:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ./admin
        target: /limbo/admin
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${LIMBO_LIDARR_ROOT_FOLDER_1:-${LIMBO_SLSKD_PARENT_MOUNT}}
        target: /limbo/lidarr-root-1
        bind:
          create_host_path: false
      - type: bind
        source: ${LIMBO_LIDARR_ROOT_FOLDER_2:-${LIMBO_LIDARR_ROOT_FOLDER_1:-${LIMBO_SLSKD_PARENT_MOUNT}}}
        target: /limbo/lidarr-root-2
        bind:
          create_host_path: false
      - type: bind
        source: ${LIMBO_LIDARR_ROOT_FOLDER_3:-${LIMBO_LIDARR_ROOT_FOLDER_2:-${LIMBO_LIDARR_ROOT_FOLDER_1:-${LIMBO_SLSKD_PARENT_MOUNT}}}}
        target: /limbo/lidarr-root-3
        bind:
          create_host_path: false
      - type: bind
        source: ${LIMBO_LIDARR_ROOT_FOLDER_4:-${LIMBO_LIDARR_ROOT_FOLDER_3:-${LIMBO_LIDARR_ROOT_FOLDER_2:-${LIMBO_LIDARR_ROOT_FOLDER_1:-${LIMBO_SLSKD_PARENT_MOUNT}}}}}
        target: /limbo/lidarr-root-4
        bind:
          create_host_path: false
      - type: bind
        source: ${LIMBO_LIDARR_ROOT_FOLDER_5:-${LIMBO_LIDARR_ROOT_FOLDER_4:-${LIMBO_LIDARR_ROOT_FOLDER_3:-${LIMBO_LIDARR_ROOT_FOLDER_2:-${LIMBO_LIDARR_ROOT_FOLDER_1:-${LIMBO_SLSKD_PARENT_MOUNT}}}}}}
        target: /limbo/lidarr-root-5
        bind:
          create_host_path: false
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      # --- General ---
      DEBUG: "${DEBUG:-false}"
      PRODUCTION: "${PRODUCTION:-false}"
      LIDARR_METADATA_CONFIG: "${LIDARR_METADATA_CONFIG:-BRIDGE}"
      LIMBO_APIKEY: "${LIMBO_APIKEY:-}"
      USE_CACHE: "${USE_CACHE:-true}"
      LIMBO_SEARCH_CONCURRENCY: "${LIMBO_SEARCH_CONCURRENCY:-4}"
      LIMBO_MBDB_POOL_MIN: "${LIMBO_MBDB_POOL_MIN:-1}"
      LIMBO_MBDB_POOL_MAX: "${LIMBO_MBDB_POOL_MAX:-8}"
      LIMBO_CACHE_POOL_MIN: "${LIMBO_CACHE_POOL_MIN:-1}"
      LIMBO_CACHE_POOL_MAX: "${LIMBO_CACHE_POOL_MAX:-4}"
      LIMBO_PROVIDER_ID_POOL_MIN: "${LIMBO_PROVIDER_ID_POOL_MIN:-1}"
      LIMBO_PROVIDER_ID_POOL_MAX: "${LIMBO_PROVIDER_ID_POOL_MAX:-4}"
      LIMBO_DB_HOOK_POOL_MIN: "${LIMBO_DB_HOOK_POOL_MIN:-1}"
      LIMBO_DB_HOOK_POOL_MAX: "${LIMBO_DB_HOOK_POOL_MAX:-4}"
      ENABLE_STATS: "${ENABLE_STATS:-false}"
      ROOT_PATH: "${ROOT_PATH:-}"
      LIMBO_VERSION_FILE: "/limbo/VERSION"
      LIMBO_REPLICATION_SCHEDULE: "${LIMBO_REPLICATION_SCHEDULE:-}"
      LIMBO_INDEX_SCHEDULE: "${LIMBO_INDEX_SCHEDULE:-}"
      MUSICBRAINZ_REPLICATION_ENABLED: "${MUSICBRAINZ_REPLICATION_ENABLED:-1}"
      MUSICBRAINZ_REPLICATION_SCHEDULE: "${MUSICBRAINZ_REPLICATION_SCHEDULE:-}"
      MUSICBRAINZ_REPLICATION_TIME: "${MUSICBRAINZ_REPLICATION_TIME:-03:00}"
      MUSICBRAINZ_INDEXING_ENABLED: "${MUSICBRAINZ_INDEXING_ENABLED:-1}"
      MUSICBRAINZ_INDEXING_SCHEDULE: "${MUSICBRAINZ_INDEXING_SCHEDULE:-}"
      MUSICBRAINZ_INDEXING_FREQUENCY: "${MUSICBRAINZ_INDEXING_FREQUENCY:-weekly}"
      MUSICBRAINZ_INDEXING_DAY: "${MUSICBRAINZ_INDEXING_DAY:-Sunday}"
      MUSICBRAINZ_INDEXING_TIME: "${MUSICBRAINZ_INDEXING_TIME:-01:00}"
      LIMBO_ART_ENGINE_ENABLED: "${LIMBO_ART_ENGINE_ENABLED:-true}"
      LIMBO_ART_ENGINE_CACHE_ENABLED: "${LIMBO_ART_ENGINE_CACHE_ENABLED:-true}"
      LIMBO_ART_ENGINE_CACHE_TTL_SECONDS: "${LIMBO_ART_ENGINE_CACHE_TTL_SECONDS:-}"
      LIMBO_ARTWORK_DEBUG_ENABLED: "${LIMBO_ARTWORK_DEBUG_ENABLED:-false}"
      LIMBO_REFRESH_VALIDATE_TIMEOUT_SECONDS: "${LIMBO_REFRESH_VALIDATE_TIMEOUT_SECONDS:-15}"
      LIMBO_SLSKD_SHARE_REPAIR_ENABLED: "${LIMBO_SLSKD_SHARE_REPAIR_ENABLED:-true}"
      LIMBO_SLSKD_SHARE_REPAIR_INTERVAL_SECONDS: "${LIMBO_SLSKD_SHARE_REPAIR_INTERVAL_SECONDS:-900}"
      LIMBO_SLSKD_SHARE_REPAIR_STARTUP_DELAY_SECONDS: "${LIMBO_SLSKD_SHARE_REPAIR_STARTUP_DELAY_SECONDS:-120}"
      LIMBO_SLSKD_SHARE_REPAIR_COOLDOWN_SECONDS: "${LIMBO_SLSKD_SHARE_REPAIR_COOLDOWN_SECONDS:-1800}"
      LIMBO_SLSKD_SHARE_REPAIR_SET_NO_SCAN_FALSE: "${LIMBO_SLSKD_SHARE_REPAIR_SET_NO_SCAN_FALSE:-false}"
      LIMBO_SLSKD_SHARE_REPAIR_RESTART_AFTER_APPLY: "${LIMBO_SLSKD_SHARE_REPAIR_RESTART_AFTER_APPLY:-true}"
      LIMBO_SECRET_DB_FILE: "${LIMBO_SECRET_DB_FILE:-/metadata/init-state/limbo-secrets.db}"
      LIMBO_SECRET_MASTER_KEY_FILE: "${LIMBO_SECRET_MASTER_KEY_FILE:-/metadata/init-state/limbo-secrets-master.key}"
      LIMBO_SECRET_MASTER_KEY: "${LIMBO_SECRET_MASTER_KEY:-}"
      LIMBO_IMAGE_STORE_DIR: "${LIMBO_IMAGE_STORE_DIR:-/metadata/images}"
      LIMBO_IMAGE_DOWNLOAD_MAX_BYTES: "${LIMBO_IMAGE_DOWNLOAD_MAX_BYTES:-10485760}"
      LIMBO_IMAGE_DOWNLOAD_TIMEOUT_SECONDS: "${LIMBO_IMAGE_DOWNLOAD_TIMEOUT_SECONDS:-12}"
      LIMBO_IMAGE_CACHE_TTL_DAYS: "${LIMBO_IMAGE_CACHE_TTL_DAYS:-30}"
      LIMBO_IMAGE_CACHE_MAX_BYTES: "${LIMBO_IMAGE_CACHE_MAX_BYTES:-2147483648}"
      LIMBO_IMAGE_CACHE_CLEANUP_ENABLED: "${LIMBO_IMAGE_CACHE_CLEANUP_ENABLED:-true}"
      LIMBO_IMAGE_CACHE_CLEANUP_INTERVAL_SECONDS: "${LIMBO_IMAGE_CACHE_CLEANUP_INTERVAL_SECONDS:-3600}"
      LIMBO_IMAGE_CACHE_CLEANUP_STARTUP_DELAY_SECONDS: "${LIMBO_IMAGE_CACHE_CLEANUP_STARTUP_DELAY_SECONDS:-120}"
      LIMBO_LIDARR_LIBRARY_TOOL_ENABLED: "${LIMBO_LIDARR_LIBRARY_TOOL_ENABLED:-false}"
      LIMBO_LIDARR_LIBRARY_TOOL_DB_PATH: "${LIMBO_LIDARR_LIBRARY_TOOL_DB_PATH:-/metadata/init-state/lidarr-library-tool.db}"
      LIMBO_LIDARR_LIBRARY_TOOL_SYNC_INTERVAL_SECONDS: "${LIMBO_LIDARR_LIBRARY_TOOL_SYNC_INTERVAL_SECONDS:-1800}"
      LIMBO_LIDARR_LIBRARY_TOOL_STARTUP_DELAY_SECONDS: "${LIMBO_LIDARR_LIBRARY_TOOL_STARTUP_DELAY_SECONDS:-45}"
      LIMBO_LIDARR_LIBRARY_TOOL_HTTP_TIMEOUT_SECONDS: "${LIMBO_LIDARR_LIBRARY_TOOL_HTTP_TIMEOUT_SECONDS:-120}"
      LIMBO_LIDARR_LIBRARY_TOOL_BACKFILL_DEBOUNCE_SECONDS: "${LIMBO_LIDARR_LIBRARY_TOOL_BACKFILL_DEBOUNCE_SECONDS:-0.25}"

      # --- Redis ---
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"

      # --- Solr mirror ---
      PROVIDERS__SOLRSEARCHPROVIDER__1__SEARCH_SERVER: "${SOLR_URL:-http://search:8983/solr}"

      # --- MusicBrainz DB creds (set these to match your mirror) ---
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_HOST: "${MB_DB_HOST:-db}"
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PORT: "${MB_DB_PORT:-5432}"
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_USER: "${MB_DB_USER:-musicbrainz}"
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PASSWORD: "${MB_DB_PASSWORD:-musicbrainz}"

      # --- Postgres cache (lm_cache_db) ---
      POSTGRES_CACHE_HOST: "${LIMBO_CACHE_HOST:-db}"
      POSTGRES_CACHE_PORT: "${LIMBO_CACHE_PORT:-5432}"
      POSTGRES_CACHE_USER: "${LIMBO_CACHE_USER:-limbo}"
      POSTGRES_CACHE_PASSWORD: "${LIMBO_CACHE_PASSWORD:-limbo}"

    restart: unless-stopped
    depends_on:
      <<: *assets_depends
      host-ip-preflight:
        condition: service_completed_successfully
      limbo-init:
        condition: service_completed_successfully
      limbo-key-init:
        condition: service_completed_successfully
      db:
        condition: service_started
      search:
        condition: service_started
      redis:
        condition: service_started
