  mb_db_user: &default_mb_db_user "${LIMBO_MBDB_USER:-musicbrainz}"
  mb_db_password: &default_mb_db_password "${LIMBO_MBDB_PASSWORD:-musicbrainz}"
  mb_db_name: &default_mb_db_name "${MB_DB_NAME:-musicbrainz_db}"
  limbo_cache_db: &default_limbo_cache_db "${LIMBO_CACHE_DB:-limbo_cache_db}"
  limbo_cache_user: &default_limbo_cache_user "${LIMBO_CACHE_USER:-limbo}"
  limbo_cache_password: &default_limbo_cache_password "${LIMBO_CACHE_PASSWORD:-limbo}"
  limbo_uid: &default_limbo_uid "${LIMBO_DATA_ROOT:+${LIMBO_UID:-${PUID:-}}}"
  limbo_gid: &default_limbo_gid "${LIMBO_DATA_ROOT:+${LIMBO_GID:-${PGID:-}}}"
  limbo_umask: &default_limbo_umask "${LIMBO_UMASK:-${UMASK:-002}}"
  limbo_network_name: &default_limbo_network_name "${LIMBO_NETWORK_NAME:-limbo}"
  limbo_network_external: &default_limbo_network_external "${LIMBO_NETWORK_EXTERNAL:-false}"
x-default-env-items:
  tz: &default_env_tz "TZ=${TZ:-UTC}"
  mbdb_port: &default_env_mbdb_port "LIMBO_MBDB_PORT=${LIMBO_MBDB_PORT:-4818}"
  mq_port: &default_env_mq_port "LIMBO_MQ_PORT=${LIMBO_MQ_PORT}"
  pg_user: &default_env_pg_user "POSTGRES_USER=${LIMBO_MBDB_USER:-musicbrainz}"
  pg_password: &default_env_pg_password "POSTGRES_PASSWORD=${LIMBO_MBDB_PASSWORD:-musicbrainz}"
x-env-lists:
  pg_runtime: &env_list_pg_runtime
    - *default_env_tz
    - *default_env_mbdb_port
    - *default_env_mq_port
    - *default_env_pg_user
    - *default_env_pg_password
x-labels:
  managed_version: &managed_version_labels
    com.limbo.publish.version: "1.9.422.1348"
volumes:
  pgdata:
    driver: local
  mqdata:
    driver: local
  solrdata:
    driver: local
  dbdump:
    driver: local
  solrdump:
    driver: local
  limbo_data:
    name: limbo_data
    driver: local
  dldr_data:
    driver: local

networks:
  default:
    name: *default_limbo_network_name
    external: ${LIMBO_NETWORK_EXTERNAL:-false}
services:
  assets:
    image: *image_assets
    user: "0:0"
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    pull_policy: always
    environment:
      - LIMBO_ASSETS_DEPLOY_VERSION=1.9.422.1348
    volumes:
      - ./:/out
    restart: "no"
  limbo-system-init:
    image: *image_limbo
    user: "0:0"
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    pull_policy: always
    env_file: *env_files_runtime
    command:
      [
        "/bin/sh",
        "-lc",
        "/bin/sh /opt/limbo-preflight/core-env.sh && python3.14 /opt/limbo-preflight/init-limbo-key.py && /bin/sh /opt/limbo-preflight/seed-musicbrainz-admin.sh && /bin/bash /metadata/init/init-mbdb.sh",
      ]
    environment:
      TZ: *default_tz
      LIMBO_DATA_ROOT: "${LIMBO_DATA_ROOT:-}"
      LIMBO_UID: *default_limbo_uid
      LIMBO_GID: *default_limbo_gid
      LIMBO_UMASK: *default_limbo_umask
      LIMBO_WRITE_PATHS: "/metadata/limbo_data"
      LIMBO_FORCE_ROOT: "1"
      LIMBO_POLICY_UID: "${LIMBO_UID:-${PUID:-99}}"
      LIMBO_POLICY_GID: "${LIMBO_GID:-${PGID:-100}}"
      LIMBO_PGDATA_UID: "${LIMBO_PGDATA_UID:-999}"
      LIMBO_PGDATA_GID: "${LIMBO_PGDATA_GID:-999}"
      LIMBO_MQDATA_UID: "${LIMBO_MQDATA_UID:-999}"
      LIMBO_MQDATA_GID: "${LIMBO_MQDATA_GID:-999}"
      LIMBO_SOLRDATA_UID: "${LIMBO_SOLRDATA_UID:-8983}"
      LIMBO_SOLRDATA_GID: "${LIMBO_SOLRDATA_GID:-8983}"
      LIMBO_REDISDATA_UID: "${LIMBO_REDISDATA_UID:-100}"
      LIMBO_REDISDATA_GID: "${LIMBO_REDISDATA_GID:-100}"
      LIMBO_ADMIN_UID: "${LIMBO_ADMIN_UID:-${LIMBO_UID:-${PUID:-99}}}"
      LIMBO_ADMIN_GID: "${LIMBO_ADMIN_GID:-${LIMBO_GID:-${PGID:-100}}}"
      LIMBO_ADMIN_RUNTIME_DIR: "/opt/limbo-admin"
      MB_DB_HOST: *default_mb_db_host
      LIMBO_MBDB_PORT: *default_limbo_mbdb_port
      MB_DB_USER: *default_mb_db_user
      MB_DB_PASSWORD: *default_mb_db_password
      LIMBO_MBDB_USER: *default_mb_db_user
      LIMBO_MBDB_PASSWORD: *default_mb_db_password
      MB_DB_NAME: *default_mb_db_name
      LIMBO_CACHE_DB: *default_limbo_cache_db
      LIMBO_CACHE_USER: *default_limbo_cache_user
      LIMBO_CACHE_PASSWORD: *default_limbo_cache_password
    volumes:
      - ./.env:/run/limbo.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${LIMBO_PGDATA_SOURCE:-${LIMBO_DATA_ROOT:-pgdata}${LIMBO_DATA_ROOT:+/pgdata}}:/ownership/pgdata
      - ${LIMBO_MQDATA_SOURCE:-${LIMBO_DATA_ROOT:-mqdata}${LIMBO_DATA_ROOT:+/mqdata}}:/ownership/mqdata
      - ${LIMBO_SOLRDATA_SOURCE:-${LIMBO_DATA_ROOT:-solrdata}${LIMBO_DATA_ROOT:+/solrdata}}:/ownership/solrdata
      - ${LIMBO_SOLRDUMP_SOURCE:-${LIMBO_DATA_ROOT:-solrdump}${LIMBO_DATA_ROOT:+/solrdump}}:/ownership/solrdump
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/ownership/dbdump
      - ${LIMBO_LIMBO_DATA_SOURCE:-${LIMBO_DATA_ROOT:-limbo_data}${LIMBO_DATA_ROOT:+/limbo_data}}:/ownership/limbo_data
      - ${LIMBO_DLDR_DATA_SOURCE:-${LIMBO_DATA_ROOT:-dldr_data}${LIMBO_DATA_ROOT:+/dldr_data}}:/ownership/dldr_data
      - ${LIMBO_REDIS_SOURCE:-${LIMBO_DATA_ROOT:-redisdata}${LIMBO_DATA_ROOT:+/redisdata}}:/ownership/redisdata
      - ${LIMBO_ADMIN_SOURCE:-${LIMBO_DATA_ROOT:-limbo_admin}${LIMBO_DATA_ROOT:+/limbo_admin}}:/ownership/limbo_admin
      - ${LIMBO_LIMBO_DATA_SOURCE:-${LIMBO_DATA_ROOT:-limbo_data}${LIMBO_DATA_ROOT:+/limbo_data}}:/metadata/limbo_data
      - ${LIMBO_ADMIN_SOURCE:-${LIMBO_DATA_ROOT:-limbo_admin}${LIMBO_DATA_ROOT:+/limbo_admin}}:/opt/limbo-admin
    restart: "no"
    depends_on:
      <<:
        [*assets_depends, *dep_db_started, *dep_bootstrap_completed]
  db:
    image: *image_db
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped
    command: postgres -c "port=${LIMBO_MBDB_PORT:-4818}" -c "shared_buffers=${POSTGRES_SHARED_BUFFERS:-4GB}" -c "shared_preload_libraries=pg_amqp.so" -c "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-8GB}"
    environment: *env_list_pg_runtime
    shm_size: "${POSTGRES_SHM_SIZE:-4GB}"
    volumes:
      - ${LIMBO_PGDATA_SOURCE:-${LIMBO_DATA_ROOT:-pgdata}${LIMBO_DATA_ROOT:+/pgdata}}:/var/lib/postgresql/data
    expose:
      - "${LIMBO_MBDB_PORT:-4818}"
    depends_on:
      <<: [*assets_depends]
  mq:
    image: *image_mq
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    hostname: "mq"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - *default_env_tz
      - *default_env_mq_port
    restart: unless-stopped
    ulimits:
      nofile: 65536
    volumes:
      - ${LIMBO_MQDATA_SOURCE:-${LIMBO_DATA_ROOT:-mqdata}${LIMBO_DATA_ROOT:+/mqdata}}:/var/lib/rabbitmq
    expose:
      - *default_limbo_mq_port
    depends_on:
      <<: [*assets_depends]
  redis:
    image: *image_redis
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - *default_env_tz
    command: ["redis-server", "--port", "${LIMBO_REDIS_PORT}"]
    restart: unless-stopped
    expose:
      - "${LIMBO_REDIS_PORT}"
    volumes:
      - ${LIMBO_REDIS_SOURCE:-${LIMBO_DATA_ROOT:-redisdata}${LIMBO_DATA_ROOT:+/redisdata}}:/data
    depends_on:
      <<: [*assets_depends]
  bootstrap:
    image: *image_bootstrap
    user: "0:0"
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    env_file: *env_files_runtime
    environment:
      - *default_env_tz
      - *default_env_mbdb_port
      - *default_env_mq_port
      - *default_env_pg_user
      - *default_env_pg_password
    volumes:
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/media/dbdump
    command: ["bootstrap.sh"]
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_db_started]
  search:
    image: *image_search
    user: "0:0"
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    ulimits:
      nofile: 65536
    restart: unless-stopped
    environment:
      - *default_env_tz
      - SOLR_HEAP=${SOLR_HEAP:-4g}
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    command:
      [
        "/bin/sh",
        "-lc",
        "mkdir -p /var/solr/data /var/solr/logs /var/solr/solr-backups /var/cache/musicbrainz/solr-backups; chown -R 8983:8983 /var/solr /var/cache/musicbrainz/solr-backups 2>/dev/null || true; chmod -R u+rwX,g+rwX /var/solr /var/cache/musicbrainz/solr-backups 2>/dev/null || true; /usr/local/bin/bootstrap-indexes.sh; exec solr-foreground --cloud --force -p ${LIMBO_SOLR_PORT:-4817}",
      ]
    expose:
      - *default_limbo_solr_port
    volumes:
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/media/dbdump:ro
      - ${LIMBO_SOLRDATA_SOURCE:-${LIMBO_DATA_ROOT:-solrdata}${LIMBO_DATA_ROOT:+/solrdata}}:/var/solr
      - ${LIMBO_SOLRDUMP_SOURCE:-${LIMBO_DATA_ROOT:-solrdump}${LIMBO_DATA_ROOT:+/solrdump}}:/var/cache/musicbrainz/solr-backups
      - ${LIMBO_SOLRDUMP_SOURCE:-${LIMBO_DATA_ROOT:-solrdump}${LIMBO_DATA_ROOT:+/solrdump}}:/var/solr/solr-backups
    depends_on:
      <<: [*assets_depends, *dep_bootstrap_completed]
  musicbrainz:
    image: *image_musicbrainz
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:4820]/"
      net.unraid.docker.shell: "/bin/sh"
    pull_policy: ${MUSICBRAINZ_PULL_POLICY:-always}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "50"
    ports:
      - "${MUSICBRAINZ_DOCKER_HOST_IPADDRCOL:-}${LIMBO_MBRAINZ_WEB_PORT}:${LIMBO_MBRAINZ_WEB_PORT}"
    volumes:
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/media/dbdump
      - ${LIMBO_SOLRDUMP_SOURCE:-${LIMBO_DATA_ROOT:-solrdump}${LIMBO_DATA_ROOT:+/solrdump}}:/var/cache/musicbrainz/solr-backups:ro
      - ${LIMBO_LIMBO_DATA_SOURCE:-${LIMBO_DATA_ROOT:-limbo_data}${LIMBO_DATA_ROOT:+/limbo_data}}:/metadata/limbo_data:ro
      - ${LIMBO_ADMIN_SOURCE:-${LIMBO_DATA_ROOT:-limbo_admin}${LIMBO_DATA_ROOT:+/limbo_admin}}:/opt/limbo-admin:ro
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        read_only: true
        bind:
          create_host_path: true
    restart: unless-stopped
    env_file: *env_files_runtime
    environment:
      - *default_env_pg_user
      - *default_env_pg_password
      - LIMBO_MBRAINZ_WEB_PORT=${LIMBO_MBRAINZ_WEB_PORT}
      - MUSICBRAINZ_USE_PROXY=1
      - STATIC_RESOURCES_LOCATION=/static/build
      - LIMBO_ADMIN_PORT=${LIMBO_ADMIN_PORT}
      - LIMBO_ADMIN_WEB_START_SCRIPT=/opt/limbo-admin/web-server-start.sh
      - LIMBO_ADMIN_WEB_STOP_SCRIPT=/opt/limbo-admin/web-server-stop.sh
      - LIMBO_ADMIN_WEB_STATUS_SCRIPT=/opt/limbo-admin/web-server-status.sh
    depends_on:
      <<:
        [
          *assets_depends,
          *dep_limbo_system_init_completed,
          *dep_db_started,
          *dep_mq_started,
          *dep_search_started,
          *dep_redis_started,
          *dep_bootstrap_completed,
        ]
  indexer-cron:
    image: *image_indexer
    user: "0:0"
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    env_file: *env_files_runtime
    environment:
      TZ: *default_tz
      LIMBO_MBDB_PORT: *default_limbo_mbdb_port
      LIMBO_MQ_PORT: *default_limbo_mq_port
      POSTGRES_USER: *default_mb_db_user
      POSTGRES_PASSWORD: *default_mb_db_password
      LIMBO_UID: *default_limbo_uid
      LIMBO_GID: *default_limbo_gid
      LIMBO_UMASK: *default_limbo_umask
      LIMBO_WRITE_PATHS: "/media/dbdump"
    volumes:
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/media/dbdump
    command:
      [
        "/bin/sh",
        "-lc",
        "/usr/local/bin/indexer-reindex.sh || true; exec /usr/local/bin/indexer-cron.sh",
      ]
    restart: unless-stopped
    depends_on:
      <<: [*assets_depends, *dep_db_started, *dep_search_started]
  limbo-host-helper:
    image: *image_limbo
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    pull_policy: always
    # Host mode remains intentional: helper performs host-level storage/network discovery.
    network_mode: host
    # Bypass runtime UID remap wrapper for helper so it can always write
    # /run/limbo-runtime/host-ip.env on host-mounted runtime paths.
    entrypoint: ["python3.14", "-m", "metadata_srv.storage_discovery_helper"]
    env_file: *env_files_runtime
    environment:
      LIMBO_HOST_HELPER_PORT: *default_limbo_host_helper_port
      LIMBO_SECRET_MASTER_KEY: "${LIMBO_SECRET_MASTER_KEY:-}"
    volumes:
      - ${LIMBO_LIMBO_DATA_SOURCE:-${LIMBO_DATA_ROOT:-limbo_data}${LIMBO_DATA_ROOT:+/limbo_data}}:/metadata/limbo_data
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        bind:
          create_host_path: true
    restart: unless-stopped
    depends_on: *assets_depends
  limbo-dldr:
    image: *image_dldr
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.shell: "/bin/sh"
    pull_policy: always
    hostname: limbo-dldr
    restart: unless-stopped
    command: ["${DLDR_COMMAND:-/app/scripts/DLDR-start.core.sh}"]
    environment:
      LIMBO_UID: *default_limbo_uid
      LIMBO_GID: *default_limbo_gid
      LIMBO_UMASK: *default_limbo_umask
      LIMBO_WRITE_PATHS: "/data"
    ports:
      - "${LIMBO_DLDR_API_PORT}:4812"
    volumes:
      - ${LIMBO_DLDR_DATA_SOURCE:-${LIMBO_DATA_ROOT:-dldr_data}${LIMBO_DATA_ROOT:+/dldr_data}}:/data
    depends_on:
      <<: [*assets_depends, *dep_limbo_started]
  limbo:
    image: *image_limbo
    labels:
      <<: *managed_version_labels
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "http://[IP]:[PORT:4808]/assets/images/limbo-icon.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:4808]/"
      net.unraid.docker.shell: "/bin/bash"
    pull_policy: always
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LIMBO_PORT}:${LIMBO_PORT}"
    volumes:
      - ${LIMBO_LIMBO_DATA_SOURCE:-${LIMBO_DATA_ROOT:-limbo_data}${LIMBO_DATA_ROOT:+/limbo_data}}:/metadata/limbo_data
      - ${LIMBO_DBDUMP_SOURCE:-${LIMBO_DATA_ROOT:-dbdump}${LIMBO_DATA_ROOT:+/dbdump}}:/media/dbdump:ro
      - ${LIMBO_SOLRDUMP_SOURCE:-${LIMBO_DATA_ROOT:-solrdump}${LIMBO_DATA_ROOT:+/solrdump}}:/var/cache/musicbrainz/solr-backups:ro
      - ./admin/.limbo/assets/LIMBO_TAG_VERSION:/limbo/VERSION:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ./admin
        target: /limbo/admin
        read_only: true
        bind:
          create_host_path: true
    env_file: *env_files_runtime
    environment:
      TZ: *default_tz
      LIMBO_UID: *default_limbo_uid
      LIMBO_GID: *default_limbo_gid
      LIMBO_UMASK: *default_limbo_umask
      LIMBO_FORCE_ROOT: "1"
      LIMBO_WRITE_PATHS: "/metadata/limbo_data"
      LIMBO_MOUNT_ROOT: "/metadata/limbo_data/Volumes"
      LIMBO_HOST_NAME: "${HOSTNAME:-}"
      LIMBO_REDIS_PORT: *default_limbo_redis_port
      POSTGRES_CACHE_HOST: *default_mb_db_host
      LIMBO_MBDB_PORT: *default_limbo_mbdb_port
      LIMBO_ADMIN_BASE_URL: "http://musicbrainz:${LIMBO_ADMIN_PORT}"
      LIMBO_DEPLOY_VERSION: "1.9.422.1348"
      LIMBO_VERSION_FILE: "/limbo/VERSION"
      LIMBO_STARTUP_LOCK_DIR: "/tmp/limbo-startup-locks"
      # --- MusicBrainz DB creds (set these to match your mirror) ---
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_HOST: *default_mb_db_host
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PORT: *default_mb_db_port
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_USER: *default_mb_db_user
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PASSWORD: *default_mb_db_password
    restart: unless-stopped
    depends_on:
      <<:
        [
          *assets_depends,
          *dep_limbo_host_helper_started,
          *dep_db_started,
          *dep_redis_started,
        ]
