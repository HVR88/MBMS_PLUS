#   Limbo 1.9.330.874
# Description: Deploy compose file with managed assets sync
#
# THIS FILE IS REGULARLY OVERWRITTEN: It can't be modified nor manually maintained - leave it alone

name: ${COMPOSE_PROJECT_NAME:-limbo}

x-assets-depends: &assets_depends
  assets:
    condition: service_completed_successfully
x-dependency-items:
  limbo_data_migrate_completed: &dep_limbo_data_migrate_completed
    limbo-data-migrate:
      condition: service_completed_successfully
  preflight_completed: &dep_preflight_completed
    preflight:
      condition: service_completed_successfully
  db_started: &dep_db_started
    db:
      condition: service_started
  mq_started: &dep_mq_started
    mq:
      condition: service_started
  search_started: &dep_search_started
    search:
      condition: service_started
  redis_started: &dep_redis_started
    redis:
      condition: service_started
  bootstrap_completed: &dep_bootstrap_completed
    bootstrap:
      condition: service_completed_successfully
  search_bootstrap_completed: &dep_search_bootstrap_completed
    search-bootstrap:
      condition: service_completed_successfully
  limbo_host_helper_started: &dep_limbo_host_helper_started
    limbo-host-helper:
      condition: service_started
  limbo_init_completed: &dep_limbo_init_completed
    limbo-init:
      condition: service_completed_successfully
  limbo_key_init_completed: &dep_limbo_key_init_completed
    limbo-key-init:
      condition: service_completed_successfully
  limbo_musicbrainz_admin_seed_completed: &dep_limbo_musicbrainz_admin_seed_completed
    limbo-musicbrainz-admin-seed:
      condition: service_completed_successfully
x-images:
  limbo: &image_limbo ${LIMBO_IMAGE:-espressomatic/limbo:${LIMBO_CHANNEL:-latest}}
  assets: &image_assets ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-assets:${LIMBO_CHANNEL:-latest}
  db: &image_db ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-db:${LIMBO_CHANNEL:-latest}
  mq: &image_mq ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-mq:${LIMBO_CHANNEL:-latest}
  bootstrap: &image_bootstrap ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-bootstrap:${LIMBO_CHANNEL:-latest}
  musicbrainz: &image_musicbrainz ${MUSICBRAINZ_IMAGE:-${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-musicbrainz:${LIMBO_CHANNEL:-latest}}
  search: &image_search ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-search:${LIMBO_CHANNEL:-latest}
  indexer: &image_indexer ${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-indexer:${LIMBO_CHANNEL:-latest}
  dldr: &image_dldr ${DLDR_IMAGE:-${LIMBO_DOCKERHUB_NAMESPACE:-espressomatic}/${LIMBO_DOCKERHUB_REPO_PREFIX:-limbo}-dldr:${LIMBO_CHANNEL:-latest}}
x-env-files:
  runtime: &env_files_runtime
    - path: ./.env
    - path: ./.limbo/internal.env
      required: false
x-default-values:
  tz: &default_tz "${TZ:-UTC}"
  limbo_username: &default_limbo_username "${LIMBO_USERNAME:-limbo}"
  limbo_password: &default_limbo_password "${LIMBO_PASSWORD:-limbo}"
  mb_db_host: &default_mb_db_host "${MB_DB_HOST:-db}"
  mb_db_port: &default_mb_db_port "${MB_DB_PORT:-5432}"
  mb_db_user: &default_mb_db_user "${MB_DB_USER:-musicbrainz}"
  mb_db_password: &default_mb_db_password "${MB_DB_PASSWORD:-musicbrainz}"
  mb_db_name: &default_mb_db_name "${MB_DB_NAME:-musicbrainz_db}"
  limbo_cache_db: &default_limbo_cache_db "${LIMBO_CACHE_DB:-lm_cache_db}"
  limbo_cache_user: &default_limbo_cache_user "${LIMBO_CACHE_USER:-limbo}"
  limbo_cache_password: &default_limbo_cache_password "${LIMBO_CACHE_PASSWORD:-limbo}"
x-default-env-items:
  tz: &default_env_tz "TZ=${TZ:-UTC}"
  pg_user: &default_env_pg_user "POSTGRES_USER=${MB_DB_USER:-musicbrainz}"
  pg_password: &default_env_pg_password "POSTGRES_PASSWORD=${MB_DB_PASSWORD:-musicbrainz}"
  pg_port: &default_env_pg_port "PGPORT=${MB_DB_PORT:-5432}"
  postgres_port: &default_env_postgres_port "POSTGRES_PORT=${MB_DB_PORT:-5432}"
  db_port: &default_env_db_port "DB_PORT=${MB_DB_PORT:-5432}"
x-env-lists:
  pg_runtime: &env_list_pg_runtime
    - *default_env_tz
    - *default_env_pg_user
    - *default_env_pg_password
    - *default_env_pg_port
    - *default_env_postgres_port
    - *default_env_db_port
volumes:
  mqdata:
    driver: local
  pgdata:
    driver: local
  solrdata:
    driver: local
  dbdump:
    driver: local
  solrdump:
    driver: local
  limbo_data:
    name: limbo_data
    driver: local
  dldr_data:
    name: dldr_data
    driver: local
  limbo_bridge_init_state:
    name: limbo_bridge_init_state
    driver: local
services:
  assets:
    image: *image_assets
    pull_policy: always
    environment:
      - LIMBO_ASSETS_DEPLOY_VERSION=1.9.330.874
    volumes:
      - ./:/out
    restart: "no"
  preflight:
    image: *image_limbo
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/core-env.sh"]
    env_file: *env_files_runtime
    volumes:
      - ./.env:/run/limbo.env:ro
    restart: "no"
    depends_on: *assets_depends
  limbo-data-migrate:
    image: *image_limbo
    pull_policy: always
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/migrate-limbo-data.sh"]
    volumes:
      - limbo_bridge_init_state:/legacy-init-state:ro
      - limbo_data:/metadata/limbo_data
    restart: "no"
    depends_on: *assets_depends
  limbo-key-init:
    image: *image_limbo
    pull_policy: always
    entrypoint: ["python3.14", "/opt/limbo-preflight/init-limbo-key.py"]
    volumes:
      - limbo_data:/metadata/limbo_data
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_limbo_data_migrate_completed]
  limbo-musicbrainz-admin-seed:
    image: *image_limbo
    pull_policy: always
    entrypoint: ["/bin/sh", "/opt/limbo-preflight/seed-musicbrainz-admin.sh"]
    volumes:
      - limbo_data:/metadata/limbo_data
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_limbo_key_init_completed]
  db:
    image: *image_db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped
    command: postgres -c "port=${MB_DB_PORT:-5432}" -c "shared_buffers=${POSTGRES_SHARED_BUFFERS:-4GB}" -c "shared_preload_libraries=pg_amqp.so"
    environment: *env_list_pg_runtime
    shm_size: "${POSTGRES_SHM_SIZE:-4GB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "${MB_DB_PORT:-5432}"
    depends_on: *assets_depends
  mq:
    image: *image_mq
    hostname: "mq"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - *default_env_tz
    restart: unless-stopped
    ulimits:
      nofile: 65536
    volumes:
      - mqdata:/var/lib/rabbitmq
    expose:
      - "5672"
    depends_on: *assets_depends
  redis:
    image: redis:3-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      - *default_env_tz
    command: ["redis-server", "--port", "${REDIS_PORT:-6379}"]
    restart: unless-stopped
    expose:
      - "${REDIS_PORT:-6379}"
    depends_on: *assets_depends
  bootstrap:
    image: *image_bootstrap
    env_file: *env_files_runtime
    environment: *env_list_pg_runtime
    volumes:
      - dbdump:/media/dbdump
    command: ["bootstrap.sh"]
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_preflight_completed, *dep_db_started]
  search-bootstrap:
    image: *image_search
    entrypoint: ["/usr/local/bin/bootstrap-indexes.sh"]
    env_file: *env_files_runtime
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - solrdata:/var/solr
      - solrdump:/var/cache/musicbrainz/solr-backups
      - dbdump:/media/dbdump:ro
    ulimits:
      nofile: 65536
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_preflight_completed, *dep_bootstrap_completed]
  search:
    image: *image_search
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    ulimits:
      nofile: 65536
    restart: unless-stopped
    environment:
      - *default_env_tz
      - SOLR_HEAP=${SOLR_HEAP:-4g}
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    expose:
      - "8983"
    volumes:
      - dbdump:/media/dbdump:ro
      - solrdata:/var/solr
      - solrdump:/var/cache/musicbrainz/solr-backups
    depends_on:
      <<: [*assets_depends, *dep_search_bootstrap_completed]
  musicbrainz:
    image: *image_musicbrainz
    pull_policy: ${MUSICBRAINZ_PULL_POLICY:-always}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "50"
    ports:
      - "${MUSICBRAINZ_DOCKER_HOST_IPADDRCOL:-}${MUSICBRAINZ_WEB_SERVER_PORT:-4815}:${MUSICBRAINZ_WEB_SERVER_PORT:-4815}"
    volumes:
      - dbdump:/media/dbdump
      - solrdump:/var/cache/musicbrainz/solr-backups:ro
      - limbo_data:/metadata/limbo_data:ro
      - limbo_data:/opt/limbo-admin:ro
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        read_only: true
        bind:
          create_host_path: true
    restart: unless-stopped
    env_file: *env_files_runtime
    environment:
      - *default_env_pg_user
      - *default_env_pg_password
      - MUSICBRAINZ_USE_PROXY=1
      - STATIC_RESOURCES_LOCATION=/static/build
      - LIMBO_ADMIN_PORT=${LIMBO_ADMIN_PORT:-4815}
      - LIMBO_ADMIN_WEB_START_SCRIPT=/opt/limbo-admin/web-server-start.sh
      - LIMBO_ADMIN_WEB_STOP_SCRIPT=/opt/limbo-admin/web-server-stop.sh
      - LIMBO_ADMIN_WEB_STATUS_SCRIPT=/opt/limbo-admin/web-server-status.sh
    depends_on:
      <<:
        [
          *assets_depends,
          *dep_preflight_completed,
          *dep_limbo_key_init_completed,
          *dep_limbo_musicbrainz_admin_seed_completed,
          *dep_db_started,
          *dep_mq_started,
          *dep_search_started,
          *dep_redis_started,
          *dep_bootstrap_completed,
          *dep_search_bootstrap_completed,
        ]
  indexer:
    image: *image_indexer
    environment: *env_list_pg_runtime
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - dbdump:/media/dbdump
    depends_on:
      <<:
        [*assets_depends, *dep_db_started, *dep_mq_started, *dep_search_started]
  indexer-cron:
    image: *image_indexer
    env_file: *env_files_runtime
    environment: *env_list_pg_runtime
    volumes:
      - dbdump:/media/dbdump
    command: ["/usr/local/bin/indexer-cron.sh"]
    restart: unless-stopped
    depends_on:
      <<: [*assets_depends, *dep_db_started, *dep_search_started]
  limbo-init:
    image: *image_limbo
    pull_policy: always
    entrypoint: ["/bin/bash", "/metadata/init/init-mbdb.sh"]
    environment:
      TZ: *default_tz
      MB_DB_HOST: *default_mb_db_host
      MB_DB_PORT: *default_mb_db_port
      MB_DB_USER: *default_mb_db_user
      MB_DB_PASSWORD: *default_mb_db_password
      MB_DB_NAME: *default_mb_db_name
      LIMBO_CACHE_DB: *default_limbo_cache_db
      LIMBO_CACHE_USER: *default_limbo_cache_user
      LIMBO_CACHE_PASSWORD: *default_limbo_cache_password
    restart: "no"
    depends_on:
      <<: [*assets_depends, *dep_db_started, *dep_bootstrap_completed]
  limbo-host-helper:
    image: *image_limbo
    pull_policy: always
    network_mode: host
    entrypoint: ["python3.14", "-m", "metadata_srv.storage_discovery_helper"]
    env_file: *env_files_runtime
    environment:
      LIMBO_HOST_HELPER_PORT: "${LIMBO_HOST_HELPER_PORT:-4809}"
      LIMBO_SECRET_MASTER_KEY: "${LIMBO_SECRET_MASTER_KEY:-}"
    volumes:
      - limbo_data:/metadata/limbo_data
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        bind:
          create_host_path: true
    restart: unless-stopped
    depends_on: *assets_depends
  dldr-core:
    image: *image_dldr
    pull_policy: always
    container_name: dldr-core
    hostname: dldr-core
    restart: unless-stopped
    command: ["${DLDR_COMMAND:-/app/scripts/dldr-stack.sh}"]
    ports:
      - "${DLDR_WEB_PORT:-4812}:4812"
    environment:
      - TZ=${TZ:-UTC}
      - DLDR_LOG_LEVEL=${DLDR_LOG_LEVEL:-INFO}
      - DLDR_API_KEY=${DLDR_API_KEY:-dldr-default-key-change-me}
      - DLDR_STARTUP_STAGER=${DLDR_STARTUP_STAGER:-true}
      - DLDR_STARTUP_SEARCH=${DLDR_STARTUP_SEARCH:-true}
      - DLDR_STARTUP_DOWNLOADER=${DLDR_STARTUP_DOWNLOADER:-true}
      - DLDR_STARTUP_IMPORTER=${DLDR_STARTUP_IMPORTER:-true}
      # Optional env seed for integration settings (API settings take precedence)
      - DLDR_INTEGRATION_LIDARR_HOST_URL=${DLDR_INTEGRATION_LIDARR_HOST_URL:-}
      - DLDR_INTEGRATION_LIDARR_API_KEY=${DLDR_INTEGRATION_LIDARR_API_KEY:-}
      - DLDR_INTEGRATION_LIDARR_PATH_TO_SLSKD_DL=${DLDR_INTEGRATION_LIDARR_PATH_TO_SLSKD_DL:-}
      # Optional env seed for primary download source settings (API settings take precedence)
      - DLDR_SLSKD_HOST_URL=${DLDR_SLSKD_HOST_URL:-}
      - DLDR_SLSKD_API_KEY=${DLDR_SLSKD_API_KEY:-}
      - DLDR_PATH_TO_SLSKD_DL=/downloads
      - DLDR_SUB_FOLDER=${DLDR_SUB_FOLDER:-Limbo_DLDR}
    volumes:
      - dldr_data:/data
      - type: bind
        source: ${DLDR_PATH_TO_SLSKD_DL:-./admin/.limbo/dldr-downloads}
        target: /downloads
        bind:
          create_host_path: true
    depends_on: *assets_depends
  limbo:
    image: *image_limbo
    pull_policy: always
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LIMBO_PORT:-4808}:4808"
    volumes:
      - limbo_data:/metadata/limbo_data
      - dbdump:/media/dbdump:ro
      - ./admin/.limbo/assets/LIMBO_TAG_VERSION:/limbo/VERSION:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ./admin/.limbo/runtime
        target: /run/limbo-runtime
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ./admin
        target: /limbo/admin
        read_only: true
        bind:
          create_host_path: true
    env_file: *env_files_runtime
    environment:
      TZ: *default_tz
      REDIS_PORT: "${REDIS_PORT:-6379}"
      POSTGRES_CACHE_HOST: *default_mb_db_host
      POSTGRES_CACHE_PORT: *default_mb_db_port
      LIMBO_ADMIN_BASE_URL: "http://musicbrainz:${LIMBO_ADMIN_PORT:-4815}"
      LIMBO_VERSION_FILE: "/limbo/VERSION"
      # --- MusicBrainz DB creds (set these to match your mirror) ---
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_HOST: *default_mb_db_host
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PORT: *default_mb_db_port
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_USER: *default_mb_db_user
      PROVIDERS__MUSICBRAINZDBPROVIDER__1__DB_PASSWORD: *default_mb_db_password
    restart: unless-stopped
    depends_on:
      <<:
        [
          *assets_depends,
          *dep_limbo_host_helper_started,
          *dep_limbo_init_completed,
          *dep_limbo_key_init_completed,
          *dep_db_started,
          *dep_search_started,
          *dep_redis_started,
        ]
